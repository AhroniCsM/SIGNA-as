<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0e17;font-family:'Inter',system-ui,sans-serif;color:#e0e6f0}
  @keyframes badgePulse{0%,100%{opacity:1}50%{opacity:.65}}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  input:focus{border-color:#18ffff!important;outline:none}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0e17}::-webkit-scrollbar-thumb{background:#1a2236;border-radius:2px}

  /* ── Mobile / tablet responsive overrides ─────────────────────────── */
  /* Tablet & below: collapse sidebar below cards, shrink grid to 2-3 cols */
  @media (max-width: 1100px){
    .signa-root{padding:16px!important}
    .signa-main{flex-direction:column!important;gap:16px!important}
    .signa-sidebar{width:100%!important;max-width:none!important}
    .signa-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important;gap:14px!important}
    .signa-card{grid-column:span 1!important;max-width:none!important}
    .signa-card-inner{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  }
  /* Phone: single-column everywhere, tighter padding, wrap top bar */
  @media (max-width: 680px){
    .signa-root{padding:10px!important}
    .signa-topbar{flex-direction:column!important;align-items:flex-start!important;gap:10px!important}
    .signa-topbar-right{flex-wrap:wrap!important;gap:8px!important;width:100%!important}
    .signa-search{flex:1 1 100%!important}
    .signa-search input{width:100%!important;flex:1!important;min-width:0!important}
    .signa-grid{grid-template-columns:1fr!important;gap:12px!important}
    .signa-card-inner{grid-template-columns:1fr!important}
    .signa-focus-row{flex-direction:column!important}
    /* Hide card resize controls on phones — the gesture is desktop-only */
    .signa-card-resize{display:none!important}
  }
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useMemo,useCallback,useEffect,useRef}=React;

/* ══════════════════════════════════════════════════════════════════════════
   ICONS
   ══════════════════════════════════════════════════════════════════════════ */
const I=({d,size=16,color="#7b8ba3"})=><svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const CheckCircle=({size,color})=><I d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3" size={size} color={color}/>;
const XCircle=({size,color})=><I d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm3.5 6.5l-7 7m0-7l7 7" size={size} color={color}/>;
const AlertTriangle=({size,color})=><I d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01" size={size} color={color}/>;
const TrendingUp=({size,color})=><I d="M23 6l-9.5 9.5-5-5L1 18" size={size} color={color}/>;
const Zap=({size,color})=><I d="M13 2L3 14h9l-1 10 10-12h-9l1-10z" size={size} color={color}/>;
const Target=({size,color})=><I d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm0 4a6 6 0 1 0 0 12 6 6 0 0 0 0-12zm0 4a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" size={size} color={color}/>;
const Shield=({size,color})=><I d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10zM12 8v4m0 4h.01" size={size} color={color}/>;
const Copy=({size,color})=><I d="M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2zM5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" size={size} color={color}/>;
const Check=({size,color})=><I d="M20 6L9 17l-5-5" size={size} color={color}/>;
const Clock=({size,color})=><I d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM12 6v6l4 2" size={size} color={color}/>;
const Wallet=({size,color})=><I d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4M4 6v12a2 2 0 0 0 2 2h14v-4" size={size} color={color}/>;
const Flame=({size,color})=><I d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14 0-5.5 3.5-7.5C14 3 14.5 4 14 5c-1 1.5-.5 2.5 0 3.5.5 1 1 2.5 1 4a5 5 0 1 1-10 0c0-1.5.5-2.5 1.5-3" size={size} color={color}/>;
const Building=({size,color})=><I d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18zM6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2" size={size} color={color}/>;
const Users=({size,color})=><I d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8z" size={size} color={color}/>;
const ArrowLeft=({size,color})=><I d="M19 12H5M12 19l-7-7 7-7" size={size} color={color}/>;

/* ══════════════════════════════════════════════════════════════════════════
   PALETTE + HELPERS
   ══════════════════════════════════════════════════════════════════════════ */
const C={bg:"#0a0e17",card:"#0f1420",cardBorder:"#1a2236",green:"#00e676",greenDim:"#00e67633",amber:"#ffc107",amberDim:"#ffc10733",red:"#ff4444",redDim:"#ff444433",cyan:"#18ffff",cyanDim:"#18ffff22",purple:"#bb86fc",purpleDim:"#bb86fc33",textPrimary:"#e0e6f0",textSecondary:"#7b8ba3",textMuted:"#4a5568"};
const gradeAccent=g=>g==="A"?C.green:g==="B"?C.green:g==="C"?C.amber:C.red;
const sentimentColour=s=>s==="BULLISH"?C.green:s==="NEUTRAL"?C.amber:C.red;
const statusMeta={CONFIRMED:{colour:C.green,bg:C.greenDim,glow:true,Icon:CheckCircle},LEADING:{colour:C.cyan,bg:C.cyanDim,glow:true,Icon:TrendingUp},ALERT:{colour:C.amber,bg:C.amberDim,glow:false,Icon:AlertTriangle},BEARISH:{colour:C.red,bg:C.redDim,glow:false,Icon:XCircle}};

function useAnimatedValue(target,dur=800){const[v,setV]=useState(0);const r=useRef();useEffect(()=>{const s=v,st=performance.now();const a=now=>{const e=now-st,p=Math.min(e/dur,1),ease=1-Math.pow(1-p,3);setV(Math.round(s+(target-s)*ease));if(p<1)r.current=requestAnimationFrame(a)};r.current=requestAnimationFrame(a);return()=>cancelAnimationFrame(r.current)},[target]);return v}
function useCopy(){const[c,setC]=useState(false);const copy=useCallback(t=>{navigator.clipboard?.writeText(t).then(()=>{setC(true);setTimeout(()=>setC(false),1500)})},[]);return{copied:c,copy}}

/* ══════════════════════════════════════════════════════════════════════════
   SHARED COMPONENTS (SignalCard internals)
   ══════════════════════════════════════════════════════════════════════════ */
function BullishGauge({pct,sentiment,id="m"}){const ap=useAnimatedValue(pct),accent=sentimentColour(sentiment),R=80,circ=Math.PI*R,prog=(ap/100)*circ,ang=Math.PI+(ap/100)*Math.PI,nx=100+R*Math.cos(ang),ny=110+R*Math.sin(ang);return<div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:4}}><svg width="200" height="120" viewBox="0 0 200 120"><defs><linearGradient id={`gg${id}`} x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor={C.red}/><stop offset="50%" stopColor={C.amber}/><stop offset="100%" stopColor={C.green}/></linearGradient><filter id={`gl${id}`}><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><path d="M 20 110 A 80 80 0 0 1 180 110" fill="none" stroke="#1a2236" strokeWidth="10" strokeLinecap="round"/><path d="M 20 110 A 80 80 0 0 1 180 110" fill="none" stroke={`url(#gg${id})`} strokeWidth="10" strokeLinecap="round" strokeDasharray={`${prog} ${circ}`} filter={`url(#gl${id})`} style={{transition:"stroke-dasharray .06s linear"}}/><circle cx={nx} cy={ny} r="5" fill={accent} filter={`url(#gl${id})`} style={{transition:"cx .06s,cy .06s"}}/></svg><div style={{marginTop:-36,textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:accent,letterSpacing:2,textTransform:"uppercase"}}>{sentiment}</div><div style={{fontSize:36,fontWeight:800,color:C.textPrimary,lineHeight:1}}>{ap}%</div></div></div>}

function GradeBadge({grade}){const a=gradeAccent(grade);return<div style={{width:52,height:52,borderRadius:"50%",border:`3px solid ${a}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",boxShadow:`0 0 20px ${a}55,0 0 40px ${a}22`,margin:"0 auto",transition:"all .4s"}}><span style={{fontSize:24,fontWeight:800,color:a,lineHeight:1}}>{grade}</span><span style={{fontSize:7,fontWeight:600,color:C.textSecondary,letterSpacing:1,textTransform:"uppercase"}}>Grade</span></div>}

function SizeLegend({activeSize}){return<div style={{display:"flex",justifyContent:"center",gap:8,fontSize:11,color:C.textMuted,margin:"6px 0 10px"}}>{[{k:"full size",l:"A/B"},{k:"half size",l:"C"},{k:"starter",l:"D"}].map(s=><span key={s.k} style={{color:activeSize===s.k?C.textPrimary:C.textMuted,fontWeight:activeSize===s.k?600:400}}>{s.l}: {s.k}</span>)}</div>}

function TradeParam({label,value,sub,colour,icon:Ic,rawValue}){const{copied,copy}=useCopy();return<div onClick={()=>rawValue&&copy(`${label}: ${rawValue}`)} style={{flex:1,background:`${colour}11`,border:`1px solid ${colour}33`,borderRadius:8,padding:"10px 10px 8px",textAlign:"center",cursor:rawValue?"pointer":"default",transition:"border-color .2s"}} title={rawValue?"Click to copy":undefined}><div style={{fontSize:10,color:C.textSecondary,textTransform:"uppercase",letterSpacing:1,marginBottom:4,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>{Ic&&<Ic size={12} color={colour}/>}{label}{rawValue&&(copied?<Check size={10} color={C.green}/>:<Copy size={10} color={C.textMuted}/>)}</div><div style={{fontSize:17,fontWeight:700,color:colour}}>{value}</div>{sub&&<div style={{fontSize:10,color:C.textSecondary,marginTop:2}}>{sub}</div>}</div>}

const GRADE_RISK={A:1.5,B:1.0,C:0.5,D:0,F:0};
const WIN_RATE={A:0.55,B:0.50,C:0.40,D:0.30,F:0.25};
function PositionSizer({entry,stopLoss,target,grade,noSetup}){
  const[bal,setBal]=useState(25000);
  const sug=GRADE_RISK[grade]??1.0;
  const[risk,setRisk]=useState(sug);
  const[maxPos,setMaxPos]=useState(20);
  const[open,setOpen]=useState(false);
  useEffect(()=>{setRisk(GRADE_RISK[grade]??1.0)},[grade]);
  const r=useMemo(()=>{
    if(!entry||!stopLoss||stopLoss>=entry||!bal||bal<=0)return null;
    if(noSetup||risk<=0)return{block:true,msg:risk<=0?"Grade "+(grade||"?")+" → risk set to 0. Skip this trade.":"No setup — do not trade."};
    const rps=entry-stopLoss, stopPct=(rps/entry)*100;
    const drBase=bal*(risk/100);
    let shares=Math.floor(drBase/rps);
    let pv=shares*entry;
    const maxDollars=bal*(maxPos/100);
    let capHit=false;
    if(pv>maxDollars){shares=Math.floor(maxDollars/entry);pv=shares*entry;capHit=true;}
    const dr=shares*rps, posPct=pv/bal*100;
    const reward=target&&target>entry?shares*(target-entry):0;
    const rMult=target&&target>entry?(target-entry)/rps:0;
    const wr=WIN_RATE[grade]??0.45;
    const ev=target&&target>entry?(wr*reward-(1-wr)*dr):null;
    const addOn=entry+rps*0.5;
    const tranches=shares>1?[
      {l:"Starter",s:Math.floor(shares/2),p:entry,n:"At signal confirm"},
      {l:"Add-on",s:shares-Math.floor(shares/2),p:+addOn.toFixed(2),n:`@ +0.5R (trend confirming)`},
    ]:[];
    const warns=[];
    if(stopPct>10)warns.push({lvl:"warn",msg:`Wide stop (${stopPct.toFixed(1)}% from entry) — volatile trade.`});
    if(rMult&&rMult<2)warns.push({lvl:"warn",msg:`Low R:R (${rMult.toFixed(2)}:1). Pros want ≥2:1.`});
    if(capHit)warns.push({lvl:"info",msg:`Position capped at ${maxPos}% of portfolio.`});
    if(ev!=null&&ev<0)warns.push({lvl:"warn",msg:`Negative expected value ($${ev.toFixed(0)}) at ${Math.round(wr*100)}% hit rate.`});
    if(shares===0)warns.push({lvl:"warn",msg:"Share count rounded to 0 — bump risk % or portfolio."});
    return{shares,dr:dr.toFixed(2),pv:pv.toFixed(2),posPct:posPct.toFixed(1),stopPct:stopPct.toFixed(1),reward:reward.toFixed(0),rMult:rMult.toFixed(2),ev:ev!=null?ev.toFixed(0):null,wr:Math.round(wr*100),tranches,warns,capHit,sug};
  },[bal,risk,maxPos,entry,stopLoss,target,grade,noSetup]);
  if(!r)return null;
  if(r.block)return<div style={{background:`${C.amber}11`,border:`1px solid ${C.amber}44`,borderRadius:10,padding:12,marginTop:8,display:"flex",alignItems:"center",gap:8}}><AlertTriangle size={14} color={C.amber}/><span style={{fontSize:11,color:C.amber,fontWeight:600}}>{r.msg}</span></div>;
  const riskOff=Math.abs(risk-sug)>0.01;
  return<div style={{background:"#111827",border:`1px solid ${C.cardBorder}`,borderRadius:10,padding:open?12:"8px 12px",marginTop:8}}>
    <div onClick={()=>setOpen(!open)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",marginBottom:open?8:0}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}><Wallet size={13} color={C.cyan}/><span style={{fontSize:11,fontWeight:700,color:C.textSecondary,letterSpacing:1,textTransform:"uppercase"}}>Position Sizer</span>{!open&&<span style={{fontSize:10,color:C.textMuted,marginLeft:6}}>· {r.shares} sh · ${Number(r.dr).toLocaleString()} risk · {r.rMult}R</span>}</div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:9,color:C.textMuted}}>Grade {grade||"?"} → {sug}%</span>
        <span style={{fontSize:14,color:C.textMuted,lineHeight:1}}>{open?"▾":"▸"}</span>
      </div>
    </div>
    {open&&<>
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      <label style={{flex:1}}><span style={{fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:.5}}>Portfolio $</span><input type="number" value={bal} onChange={e=>setBal(+e.target.value)} style={{width:"100%",background:"#0a0e17",border:`1px solid ${C.cardBorder}`,borderRadius:6,color:C.textPrimary,padding:"4px 8px",fontSize:13,fontWeight:600,marginTop:2}}/></label>
      <label style={{flex:1}}><span style={{fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:.5}}>Risk %{riskOff&&<span style={{color:C.amber,marginLeft:4}}>⚠</span>}</span><input type="number" value={risk} step="0.25" onChange={e=>setRisk(+e.target.value)} style={{width:"100%",background:"#0a0e17",border:`1px solid ${riskOff?C.amber:C.cardBorder}`,borderRadius:6,color:C.textPrimary,padding:"4px 8px",fontSize:13,fontWeight:600,marginTop:2}}/></label>
      <label style={{flex:1}}><span style={{fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:.5}}>Max Pos %</span><input type="number" value={maxPos} step="5" onChange={e=>setMaxPos(+e.target.value)} style={{width:"100%",background:"#0a0e17",border:`1px solid ${C.cardBorder}`,borderRadius:6,color:C.textPrimary,padding:"4px 8px",fontSize:13,fontWeight:600,marginTop:2}}/></label>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:8}}>
      {[
        {l:"Shares",v:r.shares.toLocaleString(),c:C.cyan},
        {l:"$ at Risk",v:"$"+Number(r.dr).toLocaleString(),c:C.amber},
        {l:"Position",v:"$"+Number(r.pv).toLocaleString(),c:C.green,sub:r.posPct+"%"},
      ].map(x=><div key={x.l} style={{flex:1,textAlign:"center",padding:"6px 4px",background:"#0a0e17",borderRadius:6}}><div style={{fontSize:9,color:C.textMuted,textTransform:"uppercase"}}>{x.l}</div><div style={{fontSize:15,fontWeight:700,color:x.c}}>{x.v}</div>{x.sub&&<div style={{fontSize:9,color:C.textMuted}}>{x.sub} of port</div>}</div>)}
    </div>
    {target&&<div style={{display:"flex",gap:8,marginBottom:8}}>
      {[
        {l:"Reward @ Tgt",v:"$"+Number(r.reward).toLocaleString(),c:C.green},
        {l:"R-multiple",v:r.rMult+"R",c:parseFloat(r.rMult)>=2?C.green:C.amber},
        {l:`EV @ ${r.wr}% win`,v:r.ev!=null?(r.ev>=0?"+$":"-$")+Math.abs(r.ev).toLocaleString():"—",c:r.ev>=0?C.green:C.red},
      ].map(x=><div key={x.l} style={{flex:1,textAlign:"center",padding:"6px 4px",background:"#0a0e17",borderRadius:6}}><div style={{fontSize:9,color:C.textMuted,textTransform:"uppercase"}}>{x.l}</div><div style={{fontSize:14,fontWeight:700,color:x.c}}>{x.v}</div></div>)}
    </div>}
    {r.tranches.length>0&&<div style={{marginBottom:8}}>
      <div style={{fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Entry Plan</div>
      {r.tranches.map(t=><div key={t.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#0a0e17",borderRadius:6,marginBottom:3,fontSize:11}}>
        <span style={{fontWeight:700,color:C.cyan,width:60}}>{t.l}</span>
        <span style={{color:C.textPrimary,fontWeight:600}}>{t.s} sh @ ${t.p}</span>
        <span style={{color:C.textMuted,fontSize:10}}>{t.n}</span>
      </div>)}
    </div>}
    {r.warns.length>0&&<div style={{display:"flex",flexDirection:"column",gap:4}}>
      {r.warns.map((w,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,padding:"4px 8px",background:`${w.lvl==="warn"?C.amber:C.cyan}11`,border:`1px solid ${w.lvl==="warn"?C.amber:C.cyan}33`,borderRadius:6,color:w.lvl==="warn"?C.amber:C.cyan}}>
        <AlertTriangle size={10}/><span>{w.msg}</span>
      </div>)}
    </div>}
    </>}
  </div>
}

// Sector Trend Scale — how aligned is the stock with its sector?
// alignmentScore: -100 (fighting trend) ... 0 (neutral) ... +100 (riding trend)
function SectorTrendScale({sector,sectorTrend,stockTrend,alignmentScore}){
  const aligned=alignmentScore>=60,neutral=alignmentScore>=20&&alignmentScore<60,against=alignmentScore<20;
  const col=aligned?C.green:neutral?C.amber:C.red;
  const label=aligned?"WITH THE TREND":neutral?"PARTIAL ALIGNMENT":"AGAINST THE TREND";
  // map -100..100 to 0..100 for bar position
  const pos=Math.max(0,Math.min(100,(alignmentScore+100)/2));
  const sDir=sectorTrend.direction==="up"?"▲":sectorTrend.direction==="down"?"▼":"■";
  const kDir=stockTrend.direction==="up"?"▲":stockTrend.direction==="down"?"▼":"■";
  const sCol=sectorTrend.direction==="up"?C.green:sectorTrend.direction==="down"?C.red:C.amber;
  const kCol=stockTrend.direction==="up"?C.green:stockTrend.direction==="down"?C.red:C.amber;
  return<div style={{background:"#111827",border:`1px solid ${col}33`,borderRadius:10,padding:12,marginTop:8}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}><Building size={12} color={col}/><span style={{fontSize:11,fontWeight:700,color:C.textSecondary,letterSpacing:1,textTransform:"uppercase"}}>Sector: {sector}</span></div>
      <span style={{fontSize:10,fontWeight:700,color:col,background:`${col}22`,padding:"2px 8px",borderRadius:4,letterSpacing:.5,boxShadow:aligned?`0 0 8px ${col}44`:"none"}}>{label}</span>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:6}}>
      <span style={{color:C.textMuted}}>Sector 1M: <span style={{color:sCol,fontWeight:700}}>{sDir} {sectorTrend.pct>0?"+":""}{sectorTrend.pct}%</span></span>
      <span style={{color:C.textMuted}}>Stock 1M: <span style={{color:kCol,fontWeight:700}}>{kDir} {stockTrend.pct>0?"+":""}{stockTrend.pct}%</span></span>
    </div>
    {/* Alignment scale bar */}
    <div style={{position:"relative",width:"100%",height:8,background:"linear-gradient(90deg,#ff4444 0%,#ffc107 50%,#00e676 100%)",borderRadius:4,marginTop:4,opacity:.7}}>
      <div style={{position:"absolute",left:`${pos}%`,top:-3,transform:"translateX(-50%)",width:4,height:14,background:C.textPrimary,borderRadius:2,boxShadow:`0 0 8px ${col}`}}/>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.textMuted,marginTop:4,textTransform:"uppercase",letterSpacing:.5}}>
      <span>Against</span><span>Neutral</span><span>With</span>
    </div>
    <div style={{textAlign:"center",marginTop:6,fontSize:11,color:C.textSecondary}}>Alignment Score: <span style={{color:col,fontWeight:700}}>{alignmentScore>0?"+":""}{alignmentScore}</span></div>
  </div>
}

function classifySent(vel,volR,avgS){
  if(vel>100&&volR<0.5&&avgS>0.5)return{colour:C.red,icon:AlertTriangle,label:"BULL TRAP"};
  if(volR>=1.5&&vel<50)return{colour:C.purple,icon:Building,label:"INSTITUTIONAL"};
  if(vel>100&&volR<1.0)return{colour:C.amber,icon:Users,label:"RETAIL HYPE"};
  if(vel>50&&volR>=1.0)return{colour:C.green,icon:TrendingUp,label:"CONFIRMED"};
  return{colour:C.textMuted,icon:null,label:"NEUTRAL"};
}

function VelBar({velocity,max}){const p=Math.min(Math.abs(velocity)/Math.max(max,1)*100,100),c=velocity>200?C.red:velocity>100?C.amber:velocity>0?C.green:C.textMuted;return<div style={{width:"100%",height:4,background:"#1a2236",borderRadius:2,overflow:"hidden"}}><div style={{width:`${p}%`,height:"100%",background:c,borderRadius:2,boxShadow:`0 0 6px ${c}44`,transition:"width .5s ease"}}/></div>}

// Badge → colour map
const BADGE_COLOUR={green:C.green,red:C.red,amber:C.amber,neutral:C.textMuted};

function SocialEdgeBar({edge}){
  const p=Math.max(0,Math.min(100,edge||0));
  const c=p>=70?C.green:p>=45?C.amber:p>=20?C.red:C.textMuted;
  return<div style={{width:"100%",height:3,background:"#1a2236",borderRadius:2,overflow:"hidden"}}>
    <div style={{width:`${p}%`,height:"100%",background:c,boxShadow:`0 0 6px ${c}55`,transition:"width .5s ease"}}/>
  </div>;
}

function TickerRow({t,onClick,active}){
  const col=BADGE_COLOUR[t.badgeColour]||C.textMuted;

  const sentCol=t.sentimentDir==="bullish"?C.green:t.sentimentDir==="bearish"?C.red:C.textMuted;
  const sentSym=t.sentimentDir==="bullish"?"▲":t.sentimentDir==="bearish"?"▼":"–";

  return<div onClick={()=>onClick?.(t.symbol)} style={{padding:"10px 12px",borderBottom:`1px solid ${C.cardBorder}`,cursor:"pointer",transition:"background .2s",background:active?`${C.green}08`:"transparent",borderLeft:active?`3px solid ${col}`:`3px solid transparent`}}>

function MomentumSidebar({tickers,active,onClickTicker}){

  const counts=useMemo(()=>{

    </div>
    <div style={{flex:1,overflowY:"auto",maxHeight:700}}>
      {filtered.length===0
        ? <div style={{padding:"28px 16px",textAlign:"center",color:C.textMuted,fontSize:11,lineHeight:1.6}}>
            No tickers match this category right now.<br/>
            <span style={{fontSize:9}}>Try another tab or toggle "Show quiet".</span>
          </div>
        : filtered.map(t=><TickerRow key={t.symbol} t={t} onClick={onClickTicker} active={active===t.symbol}/>)}
    </div>
    <div style={{padding:"8px 16px",borderTop:`1px solid ${C.cardBorder}`,display:"flex",gap:8,flexWrap:"wrap"}}>

        <div key={x.l} style={{display:"flex",alignItems:"center",gap:4}}>

    </div>
  </div>;
}

   ══════════════════════════════════════════════════════════════════════════ */
function App(){
  const[active,setActive]=useState("JRNL");
  const[view,setView]=useState("grid");
  const[focusTicker,setFocusTicker]=useState(null);
  const[liveSignals,setLiveSignals]=useState(null);   // populated from /api/signals
  const[apiStatus,setApiStatus]=useState("connecting"); // connecting | live | offline
  const[lastUpdate,setLastUpdate]=useState(null);
  const[cardSizes,setCardSizes]=useState(()=>{try{return JSON.parse(localStorage.getItem("signaCardSizes")||"{}")}catch(e){return{}}});
  const setCardSize=useCallback((sym,sz)=>setCardSizes(prev=>{const n={...prev,[sym]:sz};try{localStorage.setItem("signaCardSizes",JSON.stringify(n))}catch(e){}return n}),[]);
  const[searchQ,setSearchQ]=useState("");
  const[searchState,setSearchState]=useState("idle"); // idle | scanning | error
  const[searchErr,setSearchErr]=useState(null);
  const[scanned,setScanned]=useState({}); // symbol -> signal payload from /api/scan
  const[regime,setRegime]=useState(null); // market regime (macro gate)
  const[regimeOpen,setRegimeOpen]=useState(false);

  // Fetch regime every 5 min (server caches 30 min so most calls are instant)
  useEffect(()=>{
    let stopped=false;
    const load=async()=>{
      try{
        const r=await fetch("/api/market-regime");
        if(!r.ok)return;
        const j=await r.json();
        if(!stopped)setRegime(j);
      }catch(e){}
    };
    load();
    const id=setInterval(load,5*60*1000);
    return()=>{stopped=true;clearInterval(id);};
  },[]);

  const runSearch=useCallback(async(raw)=>{
    const sym=(raw||"").toUpperCase().trim();
    if(!sym)return;
    if(!/^[A-Z][A-Z0-9.\-]{0,9}$/.test(sym)){
      setSearchState("error");setSearchErr("Invalid symbol format");return;
    }
    setSearchState("scanning");setSearchErr(null);
    const t0=Date.now();
    window.track&&window.track("ticker_search",{symbol:sym});
    try{
      const r=await fetch(`/api/scan/${encodeURIComponent(sym)}`);
      const j=await r.json();
      if(!r.ok){
        setSearchState("error");
        const userMsg=j.userMessage||(j.error==="insufficient_data"?`${sym}: only ${j.candleCount||0} candles (need 200+)`:(j.error||"scan failed"));
        setSearchErr(userMsg);
        window.track&&window.track("ticker_search_error",{symbol:sym,error:j.error||"unknown",ms:Date.now()-t0});
        return;
      }
      window.track&&window.track("ticker_search_success",{symbol:sym,grade:j.grade,score:j.score,ms:Date.now()-t0,cached:!!j.cached});
      const merged={...(ALL_SIGNALS[sym]||{}),...j,version:j.version||1,dataDelay:j.data_delay_min||null};
      setScanned(prev=>({...prev,[sym]:merged}));
      setActive(sym);setFocusTicker(sym);setView("focus");
      setSearchState("idle");setSearchQ("");
      if(j.stale){setSearchErr(`Showing cached data (${j.staleAgeMin}m old) — ${j.staleReason?.userMessage||"live sources unavailable"}`);setSearchState("error");}
    }catch(e){
      setSearchState("error");setSearchErr(e.message||"network error");
    }
  },[]);

  // Poll live API
  useEffect(()=>{
    let stopped=false;
    const load=async()=>{
      try{
        const r=await fetch("/api/signals");
        if(!r.ok)throw 0;
        const arr=await r.json();
        if(stopped)return;
        // Merge live signal data with UI extras (sector/why/analyst/pattern) keyed by symbol
        const merged={};
        for(const s of arr){
          const base=ALL_SIGNALS[s.symbol]||{};
          merged[s.symbol]={...base,...s,version:s.version||1,dataDelay:s.data_delay_min||null};
        }
        setLiveSignals(merged);
        setApiStatus("live");
        setLastUpdate(new Date());
      }catch(e){
        if(!stopped){setApiStatus("offline");}
      }
    };
    load();
    const id=setInterval(load,15000);
    return()=>{stopped=true;clearInterval(id);};
  },[]);

  // Active dataset: live when available, else built-in demo, plus on-demand scanned tickers
  const SIGNALS=useMemo(()=>({...(liveSignals||ALL_SIGNALS),...scanned}),[liveSignals,scanned]);
  const tickerList=Object.keys(SIGNALS);

  // Live momentum from /api/momentum (ApeWisdom-backed). Falls back to demo only if endpoint fails.
  const[liveMomentum,setLiveMomentum]=useState(null);
  useEffect(()=>{
    let stopped=false;
    const load=async()=>{
      try{
        const r=await fetch("/api/momentum");
        if(!r.ok)throw 0;
        const j=await r.json();
        if(stopped||!Array.isArray(j.tickers))return;
        setLiveMomentum(j.tickers);
      }catch(e){ if(!stopped)setLiveMomentum(null); }
    };
    load();
    const id=setInterval(load,60000); // 1-min refresh; ApeWisdom updates ~hourly
    return()=>{stopped=true;clearInterval(id);};
  },[]);

  const MOMENTUM_LIVE=useMemo(()=>{
    if(Array.isArray(liveMomentum)&&liveMomentum.length){
      return liveMomentum.map(m=>{
        const sig=liveSignals?.[m.symbol];
        return {
          symbol:m.symbol,
          grade:m.grade||sig?.grade||null,
          mentionVelocity:m.velocityPct||0,
          mentions:m.mentions||0,
          bullishPct:m.bullishPct||sig?.bullishPct||0,
          volumeRatio:parseFloat((sig?.volRatio||"1×").replace("×",""))||1,
          rank:m.rank, rank24hAgo:m.rank24hAgo,
          // Social-edge fields from /api/momentum
          socialEdge:m.socialEdge??0,
          badge:m.badge||"WATCH",
          badgeColour:m.badgeColour||"neutral",
          reason:m.reason||"",
          stMsgs:m.stMsgs||0,
          stBullishPct:m.stBullishPct,
          sentimentDir:m.sentimentDir||"mixed",
          hasSocial:!!m.hasSocial,
          chatterScore:m.chatterScore||0,
        };
      });
    }
    if(!liveSignals)return MOMENTUM.map(m=>({...m,socialEdge:50,badge:"WATCH",badgeColour:"neutral",reason:"demo data",sentimentDir:"mixed"}));
    return Object.values(liveSignals).map(s=>({symbol:s.symbol,grade:s.grade,mentionVelocity:0,mentions:0,bullishPct:s.bullishPct||s.score,volumeRatio:parseFloat((s.volRatio||"1×").replace("×",""))||1,socialEdge:30,badge:"QUIET",badgeColour:"neutral",reason:"No social data yet",sentimentDir:"mixed",stMsgs:0,chatterScore:0}));
  },[liveMomentum,liveSignals]);

  const handleTickerClick=(symbol)=>{
    setActive(symbol);
    setFocusTicker(symbol);
    setView("focus");
    window.track&&window.track("ticker_click",{symbol,from:"sidebar"});
  };

  const backToGrid=()=>{setView("grid");setFocusTicker(null)};

  const focusSignal=focusTicker?SIGNALS[focusTicker]:null;

  return<div className="signa-root" style={{minHeight:"100vh",background:C.bg,padding:24}}>
    {/* Top bar */}
    <div className="signa-topbar" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,paddingBottom:16,borderBottom:`1px solid ${C.cardBorder}`}}>
      <div style={{display:"flex",alignItems:"baseline",gap:10}}>
        <span style={{fontSize:22,fontWeight:800,color:C.green,letterSpacing:2}}>SIGNA</span>
        <span style={{fontSize:12,color:C.textMuted,fontWeight:500}}>Signal Dashboard v3</span>
      </div>
      <div className="signa-topbar-right" style={{display:"flex",alignItems:"center",gap:16,fontSize:11,color:C.textSecondary,flexWrap:"wrap"}}>
        {/* Search any ticker (on-demand scan) */}
        <form className="signa-search" onSubmit={e=>{e.preventDefault();runSearch(searchQ);}} style={{display:"flex",alignItems:"center",gap:6}}>
          <input value={searchQ} onChange={e=>{setSearchQ(e.target.value);if(searchState==="error")setSearchState("idle");}}
            placeholder="Search any ticker (e.g. NFLX)"
            style={{background:C.card,border:`1px solid ${searchState==="error"?C.amber:C.cardBorder}`,borderRadius:8,padding:"5px 10px",fontSize:11,color:C.textPrimary,width:200,outline:"none"}}/>
          <button type="submit" disabled={searchState==="scanning"||!searchQ.trim()}
            style={{background:searchState==="scanning"?C.cardBorder:C.green,color:searchState==="scanning"?C.textMuted:"#000",border:"none",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:searchState==="scanning"?"wait":"pointer",opacity:searchQ.trim()?1:.4}}>
            {searchState==="scanning"?"SCANNING…":"SCAN"}
          </button>
          {searchState==="error"&&<span style={{color:C.amber,fontSize:10,fontWeight:600,marginLeft:4}}>{searchErr}</span>}
        </form>
        <span>{tickerList.length} active signals</span><span>·</span><span>{MOMENTUM_LIVE.length} tracked tickers</span>
        {apiStatus==="live"&&<span style={{display:"inline-flex",alignItems:"center",gap:4,background:`${C.green}18`,padding:"3px 10px",borderRadius:12,color:C.green,fontWeight:600}}><span style={{width:6,height:6,borderRadius:"50%",background:C.green,animation:"livePulse 2s infinite"}}/>LIVE API {lastUpdate&&`· ${lastUpdate.toLocaleTimeString()}`}</span>}
        {apiStatus==="connecting"&&<span style={{display:"inline-flex",alignItems:"center",gap:4,background:`${C.cyan}18`,padding:"3px 10px",borderRadius:12,color:C.cyan,fontWeight:600}}>CONNECTING…</span>}
        {apiStatus==="offline"&&<span style={{display:"inline-flex",alignItems:"center",gap:4,background:`${C.amber}18`,padding:"3px 10px",borderRadius:12,color:C.amber,fontWeight:600}}>DEMO DATA (API offline)</span>}
      </div>
    </div>

    {/* Market regime banner (macro gate) */}
    {regime&&regime.state&&regime.state!=="UNKNOWN"&&(()=>{
      const s=regime.state;
      const col=s==="CONFIRMED_UPTREND"?C.green:s==="UPTREND_UNDER_PRESSURE"?C.amber:C.red;
      const label=s==="CONFIRMED_UPTREND"?"CONFIRMED UPTREND":s==="UPTREND_UNDER_PRESSURE"?"UPTREND UNDER PRESSURE":"DOWNTREND";
      const msg=s==="CONFIRMED_UPTREND"?"Broad market supports breakouts. Signals at full strength.":s==="UPTREND_UNDER_PRESSURE"?"Be selective. Signals demoted 1 grade. Tighten stops, trim losers.":"Bear territory. Signals demoted 2 grades (max grade: C). Consider cash.";
      return <div onClick={()=>{setRegimeOpen(o=>!o);window.track&&window.track("regime_toggle",{state:s,open:!regimeOpen});}} style={{marginBottom:20,background:`${col}12`,border:`1px solid ${col}55`,borderRadius:12,padding:"10px 16px",cursor:"pointer",transition:"background .2s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{width:10,height:10,borderRadius:"50%",background:col,boxShadow:`0 0 10px ${col}`}}/>
            <span style={{fontSize:12,fontWeight:800,color:col,letterSpacing:1.2}}>MARKET REGIME · {label}</span>
            <span style={{fontSize:11,color:C.textMuted}}>score {regime.score}/100</span>
          </div>
          <span style={{fontSize:11,color:C.textSecondary,flex:"1 1 280px",minWidth:0}}>{msg}</span>
          <span style={{fontSize:10,color:C.textMuted,fontWeight:700}}>{regimeOpen?"▲ hide":"▼ details"}</span>
        </div>
        {regimeOpen&&<div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${col}33`,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,fontSize:11,color:C.textSecondary}}>
          {regime.components&&<>
            <div><span style={{color:C.textMuted}}>SPY vs 200-SMA:</span> <span style={{color:regime.components.spyAbove200?C.green:C.red,fontWeight:700}}>{regime.components.spyAbove200?"above":"below"}</span> {regime.components.spy200SlopeUp?"↑":"↓"}</div>
            <div><span style={{color:C.textMuted}}>QQQ vs 200-SMA:</span> <span style={{color:regime.components.qqqAbove200?C.green:C.red,fontWeight:700}}>{regime.components.qqqAbove200?"above":"below"}</span></div>
            <div><span style={{color:C.textMuted}}>Distribution days (25d):</span> <span style={{color:regime.components.distributionDays>=5?C.red:regime.components.distributionDays>=3?C.amber:C.green,fontWeight:700}}>{regime.components.distributionDays}</span></div>
            <div><span style={{color:C.textMuted}}>Sector breadth &gt;50-SMA:</span> <span style={{color:(regime.components.breadthPct||0)>=60?C.green:(regime.components.breadthPct||0)>=40?C.amber:C.red,fontWeight:700}}>{regime.components.breadthPct}%</span></div>
            <div><span style={{color:C.textMuted}}>VIX:</span> <span style={{color:(regime.components.vix||0)>=25?C.red:(regime.components.vix||0)>=18?C.amber:C.green,fontWeight:700}}>{regime.components.vix}</span></div>
            <div><span style={{color:C.textMuted}}>SPY 20d return:</span> <span style={{color:(regime.components.spy20dReturnPct||0)>=0?C.green:C.red,fontWeight:700}}>{regime.components.spy20dReturnPct>0?"+":""}{regime.components.spy20dReturnPct}%</span></div>
          </>}
          {regime.reasons&&<div style={{gridColumn:"1/-1",fontSize:10,color:C.textMuted,lineHeight:1.6,paddingTop:6,borderTop:`1px dashed ${C.cardBorder}`}}>{regime.reasons.join(" · ")}</div>}
          {regime.components?.sectorRS?.length>0&&<div style={{gridColumn:"1/-1",display:"flex",flexWrap:"wrap",gap:6,paddingTop:4}}>
            <span style={{fontSize:10,color:C.textMuted,fontWeight:700,letterSpacing:.5,marginRight:4}}>SECTOR RS (20d vs SPY):</span>
            {regime.components.sectorRS.map(s=><span key={s.etf} style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:s.rs>=0?`${C.green}18`:`${C.red}18`,color:s.rs>=0?C.green:C.red,fontWeight:600}}>{s.etf} {s.rs>=0?"+":""}{s.rs}%</span>)}
          </div>}
        </div>}
      </div>;
    })()}

    {/* Main layout */}
    <div className="signa-main" style={{display:"flex",gap:20,alignItems:"flex-start"}}>

      {/* LEFT: cards area */}
      <div style={{flex:1}}>

        {/* Focus view: single card for clicked ticker */}
        {view==="focus"&&focusSignal&&(
          <div style={{animation:"fadeIn .3s ease both"}}>
            <button onClick={backToGrid} style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:`1px solid ${C.cardBorder}`,borderRadius:8,padding:"6px 14px",color:C.textSecondary,fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:16,transition:"all .2s"}}>
              <ArrowLeft size={14} color={C.textSecondary}/> Back to all signals
            </button>

            <div style={{display:"flex",gap:20,alignItems:"flex-start"}}>
              {/* The focused signal card */}
              <SignalCard signal={focusSignal} gaugeId={`focus-${focusTicker}`}/>

              {/* Context panel: why this signal */}
              <div style={{flex:1,maxWidth:400}}>
                <div style={{background:C.card,border:`1px solid ${C.cardBorder}`,borderRadius:16,padding:20,animation:"fadeIn .4s ease .1s both"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                    <span style={{fontSize:20,fontWeight:800,color:C.textPrimary}}>{focusSignal.symbol}</span>
                    <span style={{fontSize:13,fontWeight:700,padding:"2px 10px",borderRadius:6,background:`${gradeAccent(focusSignal.grade)}22`,color:gradeAccent(focusSignal.grade),border:`1px solid ${gradeAccent(focusSignal.grade)}44`}}>Grade {focusSignal.grade}</span>
                    <span style={{fontSize:11,color:C.textMuted}}>{focusSignal.timeframe}</span>
                  </div>

                  {/* Social context from momentum data */}
                  {(()=>{
                    const mt=MOMENTUM.find(m=>m.symbol===focusTicker);
                    if(!mt)return null;
                    const sc=classifySent(mt.mentionVelocity,mt.volumeRatio,mt.avgSentiment);
                    const SI=sc.icon;
                    return<>
                      <div style={{fontSize:11,fontWeight:700,color:C.textSecondary,letterSpacing:1.5,textTransform:"uppercase",marginBottom:10}}>Social Context</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
                        {[
                          {l:"Mentions",v:mt.mentions.toLocaleString(),c:C.textPrimary},
                          {l:"Velocity",v:(mt.mentionVelocity>0?"+":"")+mt.mentionVelocity+"%",c:mt.mentionVelocity>100?C.amber:C.green},
                          {l:"Avg Sentiment",v:Math.round(mt.avgSentiment*100)+"%",c:mt.avgSentiment>0.7?C.green:C.amber},
                          {l:"Volume Ratio",v:mt.volumeRatio+"×",c:mt.volumeRatio>=1?C.green:C.amber},
                        ].map(x=><div key={x.l} style={{padding:10,background:"#111827",borderRadius:8,border:`1px solid ${C.cardBorder}`}}>
                          <div style={{fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>{x.l}</div>
                          <div style={{fontSize:16,fontWeight:700,color:x.c}}>{x.v}</div>
                        </div>)}
                      </div>

                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",borderRadius:8,background:`${sc.colour}11`,border:`1px solid ${sc.colour}33`}}>
                        {SI&&<SI size={14} color={sc.colour}/>}
                        <span style={{fontSize:12,fontWeight:700,color:sc.colour}}>{sc.label}</span>
                        <span style={{fontSize:11,color:C.textSecondary,marginLeft:4}}>
                          {sc.label==="BULL TRAP"&&"— High hype but volume dropping. Be cautious."}
                          {sc.label==="INSTITUTIONAL"&&"— Moderate mentions, strong volume. Smart money moving."}
                          {sc.label==="RETAIL HYPE"&&"— High social buzz, weak volume. Needs confirmation."}
                          {sc.label==="CONFIRMED"&&"— Social + volume aligned. High conviction."}
                          {sc.label==="NEUTRAL"&&"— No strong signal from social data."}
                        </span>
                      </div>
                    </>
                  })()}

                </div>
              </div>
            </div>
          </div>
        )}

        {/* Grid view: all signal cards, each independently resizable S/M/L/XL */}
        {view==="grid"&&(
          <div className="signa-grid" style={{display:"grid",gridTemplateColumns:"repeat(6,minmax(0,1fr))",gap:20,alignItems:"start"}}>
            {Object.values(SIGNALS).map((sig,i)=>(
              <SignalCard key={sig.symbol+sig.timeframe} signal={sig} gaugeId={`g${i}`} size={cardSizes[sig.symbol]||"M"} onResize={sz=>setCardSize(sig.symbol,sz)}/>
            ))}
          </div>
        )}
      </div>

      {/* RIGHT: Momentum Sidebar */}
      <MomentumSidebar tickers={MOMENTUM_LIVE} active={active} onClickTicker={handleTickerClick}/>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
